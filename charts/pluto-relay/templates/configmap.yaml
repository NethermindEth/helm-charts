---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pluto-relay.fullname" . }}-env-cm
  labels:
    {{- include "pluto-relay.labels" . | nindent 4 }}
data: {{- .Values.config | toYaml | nindent 2 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pluto-relay.fullname" . }}-scripts
  labels:
    {{- include "pluto-relay.labels" . | nindent 4 }}
data:
  init.sh: |
    {{- .Values.initScript | nindent 4 }}
    {{- .Values.extraInitScript | nindent 4 }}
