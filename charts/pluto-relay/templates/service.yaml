---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pluto-relay.fullname" . }}
  labels:
    app.kubernetes.io/component: main
    {{- include "pluto-relay.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
  {{- range $port := .Values.service.ports }}
    - name: {{ $port.name }}
      port: {{ $port.port }}
      targetPort: {{ $port.name }}
      protocol: {{ $port.protocol }}
  {{- end }}
  selector:
    {{- include "pluto-relay.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pluto-relay.fullname" . }}-headless
  labels:
    app.kubernetes.io/component: main
    {{- include "pluto-relay.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  {{- range $port := .Values.service.ports }}
    - name: {{ $port.name }}
      port: {{ $port.port }}
      targetPort: {{ $port.name }}
      protocol: {{ $port.protocol }}
  {{- end }}
  selector:
    {{- include "pluto-relay.selectorLabels" . | nindent 4 }}
{{- range $i := until (int .Values.replicaCount) }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pluto-relay.fullname" $ }}-{{ $i }}
  labels:
    {{- include "pluto-relay.labels" $ | nindent 4 }}
spec:
  type: {{ $.Values.service.type }}
  ports:
  {{- range $port := $.Values.service.ports }}
    - name: {{ $port.name }}
      port: {{ $port.port }}
      targetPort: {{ $port.name }}
      protocol: {{ $port.protocol }}
  {{- end }}
  selector:
    statefulset.kubernetes.io/pod-name: {{ include "pluto-relay.fullname" $ }}-{{ $i }}
    {{- include "pluto-relay.selectorLabels" $ | nindent 4 }}
{{- end }}
