---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "pluto-relay.fullname" . }}
  labels:
    {{- include "pluto-relay.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "pluto-relay.fullname" . }}
  labels:
    {{- include "pluto-relay.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "pluto-relay.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "pluto-relay.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
