{{- if .Values.p2pNodePort.enabled -}}
{{- /*
  Some clients expose more than one consecutive nodePort per replica, so the
  auto-allocation stride (startAt* mode) must match the number of ports each
  service below actually defines, otherwise adjacent replicas collide:
    - reth + discovery v5: portExecution and portExecution+2 -> 3 slots
    - lodestar:            portBeacon (tcp/udp) and portBeacon+1 (quic) -> 2 slots
  Keep these strides in sync with the port lists further down.
*/ -}}
{{- $executionStride := 1 -}}
{{- if and (eq $.Values.execution.client "reth") $.Values.execution.enableDiscoveryV5 -}}
  {{- $executionStride = 3 -}}
{{- end -}}
{{- $beaconStride := 1 -}}
{{- if eq $.Values.beacon.client "lodestar" -}}
  {{- $beaconStride = 2 -}}
{{- end -}}
{{- range $i, $e := until (int .Values.replicaCount) }}
{{- $portExecution := 0 -}}
{{- $portBeacon := 0 -}}
{{- if hasKey $.Values.p2pNodePort.replicaToNodePortExecution ($i | toString) -}}
  {{ $portExecution = index $.Values.p2pNodePort.replicaToNodePortExecution ($i | toString) }}
{{- else if $.Values.p2pNodePort.startAtExecution -}}
  {{ $portExecution = add $.Values.p2pNodePort.startAtExecution (mul $i $executionStride) }}
{{- else -}}
  {{ fail "p2pNodePort: either startAtExecution or replicaToNodePortExecution must be set" }}
{{- end }}
{{- if hasKey $.Values.p2pNodePort.replicaToNodePortBeacon ($i | toString) -}}
  {{ $portBeacon = index $.Values.p2pNodePort.replicaToNodePortBeacon ($i | toString) }}
{{- else if $.Values.p2pNodePort.startAtBeacon -}}
  {{ $portBeacon = add $.Values.p2pNodePort.startAtBeacon (mul $i $beaconStride) }}
{{- else -}}
  {{ fail "p2pNodePort: either startAtBeacon or replicaToNodePortBeacon must be set" }}
{{- end }}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "common.names.fullname" $ }}-execution-{{ $i }}
  labels:
    {{- include "common.labels.standard" $ | nindent 4 }}
    pod: "{{ include "common.names.fullname" $ }}-{{ $i }}"
    type: p2p
    client: execution
  {{- with $.Values.p2pNodePort.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ $.Values.p2pNodePort.type }}
  externalTrafficPolicy: Local
  ports:
    - name: p2p-tcp-exec
      port: {{ include "execution.p2pPort" $ }}
      protocol: TCP
      targetPort: {{ $portExecution }}
      nodePort: {{ $portExecution }}
  {{- if eq $.Values.p2pNodePort.type "NodePort" }}
    - name: p2p-udp-exec
      port: {{ include "execution.p2pPort" $ }}
      protocol: UDP
      targetPort: {{ $portExecution }}
      nodePort: {{ $portExecution }}
    {{- if and (eq $.Values.execution.client "reth") $.Values.execution.enableDiscoveryV5 }}
    - name: discv5-udp-exec
      port: {{ add (include "execution.p2pPort" $ | int) 2 }}
      protocol: UDP
      targetPort: {{ add $portExecution 2 }}
      nodePort: {{ add $portExecution 2 }}
    {{- end }}
  {{- end }}
  selector:
    {{- include "common.labels.matchLabels" $ | nindent 4 }}
    statefulset.kubernetes.io/pod-name: "{{ include "common.names.fullname" $ }}-{{ $i }}"

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "common.names.fullname" $ }}-beacon-{{ $i }}
  labels:
    {{- include "common.labels.standard" $ | nindent 4 }}
    pod: "{{ include "common.names.fullname" $ }}-{{ $i }}"
    type: p2p
    client: beacon
  {{- with $.Values.p2pNodePort.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ $.Values.p2pNodePort.type }}
  externalTrafficPolicy: Local
  ports:
    - name: p2p-tcp-beacon
      port: {{ include "beacon.p2pPort" $ }}
      protocol: TCP
      targetPort: {{ $portBeacon }}
      nodePort: {{ $portBeacon }}
  {{- if eq $.Values.p2pNodePort.type "NodePort" }}
    - name: p2p-udp-beacon
      port: {{ include "beacon.p2pPort" $ }}
      protocol: UDP
      targetPort: {{ $portBeacon }}
      nodePort: {{ $portBeacon }}
    {{- if eq $.Values.beacon.client "lodestar" }}
    - name: quic-udp-beacon
      port: {{ add (include "beacon.p2pPort" $ | int) 1 }}
      protocol: UDP
      targetPort: {{ add $portBeacon 1 }}
      nodePort: {{ add $portBeacon 1 }}
    {{- end }}
  {{- end }}
  selector:
    {{- include "common.labels.matchLabels" $ | nindent 4 }}
    statefulset.kubernetes.io/pod-name: "{{ include "common.names.fullname" $ }}-{{ $i }}"

{{- end }}
{{- end }}
