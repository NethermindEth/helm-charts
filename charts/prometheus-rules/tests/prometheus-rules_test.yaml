suite: prometheus-rules tests

release:
  namespace: some-namespace

templates:
  - prometheus-rules.yaml

tests:
  - it: given no namespace label in default labels and alert labels then should inject namespace label
    set:
      defaultAlertLabels: {}
      spec:
        groups:
          - name: test.rules
            rules:
              - alert: TestAlert
                expr: vector(1)
                for: 5m
                labels:
                  severity: warning
    asserts:
      - equal:
          path: spec.groups[0].rules[0].labels.namespace
          value: some-namespace

  - it: given namespace label in default labels then should not inject
    set:
      defaultAlertLabels:
        namespace: custom-namespace
        severity: warning
    asserts:
      - equal:
          path: spec.groups[0].rules[0].labels.namespace
          value: custom-namespace

  - it: given namespace label in alert labels then should not inject
    set:
      defaultAlertLabels: {}
      spec:
        groups:
          - name: test.rules
            rules:
              - alert: TestAlert
                expr: vector(1)
                for: 5m
                labels:
                  severity: warning
                  namespace: alert-namespace
    asserts:
      - equal:
          path: spec.groups[0].rules[0].labels.namespace
          value: alert-namespace

  - it: given namespace label in both default and alert labels then alert label takes precedence
    set:
      defaultAlertLabels:
        namespace: default-namespace
      spec:
        groups:
          - name: test.rules
            rules:
              - alert: TestAlert
                expr: vector(1)
                for: 5m
                labels:
                  severity: warning
                  namespace: alert-namespace
    asserts:
      - equal:
          path: spec.groups[0].rules[0].labels.namespace
          value: alert-namespace

  - it: given an alert and no severity label in defaults or alert labels then should fail template
    set:
      defaultAlertLabels: {}
      spec:
        groups:
          - name: test.rules
            rules:
              - alert: TestAlert
                expr: vector(1)
                for: 5m
                labels: {}
    asserts:
      - failedTemplate:
          errorMessage: "No severity label configured for group test.rules alert TestAlert, the severity label is required"

  - it: given a rule without alert and no severity label then should not fail template
    set:
      defaultAlertLabels: { }
      spec:
        groups:
          - name: test.rules
            rules:
              - record: some_record
                expr: vector(1)
                for: 5m
                labels: {}
    asserts:
      - hasDocuments:
          count: 1
