---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "prometheus-rules.fullname" . }}
  labels:
    {{- include "prometheus-rules.labels" . | nindent 4 }}
spec:
  groups:
  {{- range .Values.spec.groups }}
  {{- $groupName := .name }}
  - name: {{ $groupName }}
    rules:
    {{- range .rules }}
    - expr: |
        {{- .expr | nindent 8 }}
      {{- with .for }}
      for: {{ . }}
      {{- end }}
      {{- with .alert }}
      alert: {{ . }}
      {{- end }}
      {{- with .record }}
      record: {{ . }}
      {{- end }}
      {{- with .annotations }}
      annotations:
        {{- . | toYaml | nindent 8 }}
      {{- end }}
      labels:
        {{- $defaultLabels := $.Values.defaultAlertLabels | default (dict) }}
        {{- $labels := .labels | default (dict) }}
        {{- $mergedLabels := merge $labels $defaultLabels }}
        {{- if not (hasKey $mergedLabels "namespace") }}
          {{- $_ := set $mergedLabels "namespace" $.Release.Namespace}}
        {{- end }}
        {{- if and .alert (not (hasKey $mergedLabels "severity")) }}
          {{ fail (printf "No severity label configured for group %s alert %s, the severity label is required" $groupName .alert) }}
        {{- end }}
        {{- with $mergedLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    {{- end }}
  {{- end }}
