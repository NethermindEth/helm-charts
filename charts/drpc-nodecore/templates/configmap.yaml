{{- range $projectName, $projectConfig := .Values.projects }}
{{- $ctx := dict "root" $ "projectName" $projectName }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "drpc-nodecore.projectName" $ctx }}-config
  labels:
    {{- include "drpc-nodecore.projectLabels" $ctx | nindent 4 }}
data:
  nodecore.yaml: |
    server:
      port: 9090
      metrics-port: 9093
    {{- if $projectConfig.secretRef }}
    auth:
      enabled: true
      request-strategy:
        type: token
        token:
          value: {{ printf "${%s}" ($projectConfig.authTokenEnvVar | default "NODECORE_AUTH_TOKEN") | quote }}
    {{- end }}
    upstream-config:
      {{- with $projectConfig.nodecoreConfig }}
      {{- with .integrity }}
      integrity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (index . "failsafe-config") }}
      failsafe-config:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (index . "chain-defaults") }}
      chain-defaults:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (index . "score-policy-config") }}
      score-policy-config:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      upstreams:
        {{- $upstreams := required (printf "upstreams is required for project %s" $projectName) $projectConfig.upstreams }}
        {{- toYaml $upstreams | nindent 8 }}
{{- end }}
