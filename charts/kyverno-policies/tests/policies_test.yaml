suite: policies tests
templates:
  - policies.yaml

tests:
  - it: given missing title then render fails
    set:
      validatingPolicies:
        test-policy:
          description: A test policy
          severity: high
          category: Security
          spec: {}
    asserts:
      - failedTemplate:
          errorMessage: "Policy 'test-policy' is missing required field: title"

  - it: given missing description then render fails
    set:
      validatingPolicies:
        test-policy:
          title: Test Policy
          severity: high
          category: Security
          spec: {}
    asserts:
      - failedTemplate:
          errorMessage: "Policy 'test-policy' is missing required field: description"

  - it: given missing severity then render fails
    set:
      validatingPolicies:
        test-policy:
          title: Test Policy
          description: A test policy
          category: Security
          spec: {}
    asserts:
      - failedTemplate:
          errorMessage: "Policy 'test-policy' is missing required field: severity"

  - it: given missing category then render fails
    set:
      validatingPolicies:
        test-policy:
          title: Test Policy
          description: A test policy
          severity: high
          spec: {}
    asserts:
      - failedTemplate:
          errorMessage: "Policy 'test-policy' is missing required field: category"

  - it: given unsupported severity then render fails with allowed values and guidance
    set:
      validatingPolicies:
        test-policy:
          title: Test Policy
          description: A test policy
          severity: urgent
          category: Security
          spec: {}
    asserts:
      - failedTemplate:
          errorMessage: "Policy 'test-policy' has unsupported severity 'urgent'. Allowed values: critical, high, medium, low, info. To add support for a new severity, please open an issue or PR against the chart."

  - it: given unsupported category then render fails with allowed values and guidance
    set:
      validatingPolicies:
        test-policy:
          title: Test Policy
          description: A test policy
          severity: high
          category: Networking
          spec: {}
    asserts:
      - failedTemplate:
          errorMessage: "Policy 'test-policy' has unsupported category 'Networking'. Allowed values: Security, Best Practices, Governance, Misc, Reliability. To add support for a new category, please open an issue or PR against the chart."

  - it: given valid policy then annotations are rendered correctly
    set:
      validatingPolicies:
        test-policy:
          title: Test Policy
          description: A test policy
          severity: high
          category: Security
          spec: {}
    asserts:
      - equal:
          path: metadata.annotations["policies.kyverno.io/title"]
          value: Test Policy
      - equal:
          path: metadata.annotations["policies.kyverno.io/description"]
          value: A test policy
      - equal:
          path: metadata.annotations["policies.kyverno.io/severity"]
          value: high
      - equal:
          path: metadata.annotations["policies.kyverno.io/category"]
          value: Security

  - it: given severity in uppercase then it is normalised to lowercase in the annotation
    set:
      validatingPolicies:
        test-policy:
          title: Test Policy
          description: A test policy
          severity: HIGH
          category: Security
          spec: {}
    asserts:
      - equal:
          path: metadata.annotations["policies.kyverno.io/severity"]
          value: high

  - it: given namespacedValidatingPolicy with explicit namespace then that namespace is used
    set:
      namespacedValidatingPolicies:
        test-policy:
          title: Test Policy
          description: A test policy
          severity: high
          category: Security
          namespace: custom-ns
          spec: {}
    asserts:
      - equal:
          path: metadata.namespace
          value: custom-ns
